<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>情书模式</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-family: "Microsoft YaHei";
    overflow:hidden;
}

/* 开始界面 */
#start{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.4);
    z-index:10;
}

#start button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

/* 情书盒子 */
.box{
    width:80%;
    max-width:600px;
    background:rgba(255,255,255,0.9);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    display:none;
    position:relative;
}

h1{
    text-align:center;
    color:#ff4d6d;
}

#text{
    font-size:18px;
    line-height:1.8;
    white-space:pre-wrap;
    color:#333;
}

/* 爱心 */
.heart{
    position:absolute;
    color:#ff4d6d;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-600px);opacity:0;}
}
</style>
</head>

<body>

<!-- 开始按钮 -->
<div id="start">
    <button onclick="startLove()">💖 点击开始情书</button>
</div>

<!-- 情书内容 -->
<div class="box" id="box">
    <h1>💌 给你的信</h1>
    <div id="text"></div>
</div>

<!-- 音乐 -->
<audio id="bgm" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<script>

// 情书内容
const text = `
你好：

当你点开这个页面的时候，
有些话我想慢慢告诉你。

我喜欢你，不是冲动。

是很多个瞬间叠在一起的感觉。

看到你的时候会开心，
没看到你的时候会想你。

其实我也不知道未来会怎样，
但我知道此刻的心情很真实。

所以我写下这封信：

你很特别。
真的很特别。
`;

let i = 0;

// 打字机
function typing(){
    if(i < text.length){
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,50);
    }
}

// 爱心雨
function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.top = "100vh";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,500);

// 点击开始
function startLove(){
    document.getElementById("start").style.display = "none";
    document.getElementById("box").style.display = "block";

    // 播放音乐
    const music = document.getElementById("bgm");
    music.play();

    // 开始打字
    typing();
}

</script>

</body>
</html>
