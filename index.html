<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>给你的情书</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-family: "Arial","Microsoft YaHei";
    overflow:hidden;
}

/* 情书盒子 */
.box{
    width:80%;
    max-width:600px;
    background:rgba(255,255,255,0.85);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    position:relative;
}

/* 标题 */
h1{
    text-align:center;
    color:#ff4d6d;
}

/* 打字内容 */
#text{
    font-size:18px;
    line-height:1.8;
    color:#333;
    white-space:pre-wrap;
}

/* 爱心动画 */
.heart{
    position:absolute;
    color:#ff4d6d;
    animation:float 6s infinite;
    font-size:20px;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-600px);opacity:0;}
}
</style>
</head>

<body>

<div class="box">
    <h1>💌 给你的信</h1>
    <div id="text"></div>
</div>

<!-- 背景音乐（可换成你的 mp3） -->
<audio autoplay loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
// 情书内容（这里可以改成你想写的话）
const text = `

你好呀：

当你看到这段文字的时候，
我想告诉你一件很简单的事。

我喜欢你，不是随便说说。

是在很多个瞬间里，
都会突然想到你。

想到你的笑，
想到你的声音，
想到如果是你在身边就好了。

可能世界很大，
但对我来说，
你出现的那一刻就已经不一样了。

所以我写下这封信，
不是为了打扰你，
只是想让你知道：

你真的很特别。

`;

// 打字机效果
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,50); // 打字速度
    }
}
typing();

// 飘心效果
function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.top = "100vh";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove()},6000);
}
setInterval(createHeart,500);
</script>

</body>
</html>
